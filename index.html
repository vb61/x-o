<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اكس او | أونلاين</title>
    
    <!-- Firebase SDK (الإصدار الجديد مع Auth) -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
        body { background: #1a1a2e; font-family: system-ui, Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 16px; }
        .game-container { background: #0f0f1a; padding: 24px 20px; max-width: 420px; width: 100%; text-align: center; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #16213e; }
        h1 { color: #eee; font-size: 32px; margin-bottom: 8px; }
        .status { background: #16213e; padding: 12px; border-radius: 40px; margin: 12px 0; font-weight: bold; font-size: 18px; color: #e94560; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        .turn { background: #1a1a2e; padding: 8px; border-radius: 20px; color: #ccc; margin: 10px 0; font-size: 16px; }
        .buttons { display: flex; gap: 10px; justify-content: center; margin: 15px 0; flex-wrap: wrap; }
        button { background: #0f3460; border: none; color: white; font-weight: bold; padding: 12px 24px; border-radius: 40px; cursor: pointer; font-size: 14px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        button:hover { background: #1e5494; transform: translateY(-2px); }
        button:active { transform: scale(0.96); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
        .cell { background: #16213e; aspect-ratio: 1 / 1; display: flex; align-items: center; justify-content: center; font-size: 56px; font-weight: bold; border-radius: 16px; cursor: pointer; transition: 0.1s; color: #eee; }
        .cell:hover:not(.disabled) { background: #1f2d50; }
        .cell.X { color: #4db8ff; text-shadow: 0 0 15px #4db8ff; }
        .cell.O { color: #ff9f4a; text-shadow: 0 0 15px #ff9f4a; }
        .cell.disabled { cursor: default; }
        footer { font-size: 11px; color: #555; margin-top: 20px; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid #fff; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="game-container">
    <h1>🎮 اكس او أونلاين</h1>
    <div class="status" id="statusMsg">🔄 جاري التحميل...</div>
    <div class="turn" id="turnMsg">⚡ جاري التسجيل...</div>
    <div class="buttons">
        <button id="searchBtn" style="display:none;">🔍 بحث عن لاعب</button>
        <button id="cancelBtn" style="display:none;">❌ إلغاء</button>
        <button id="leaveBtn" style="display:none;">🚪 مغادرة</button>
    </div>
    <div class="board" id="board"></div>
    <footer>🎯 أونلاين حقيقي | آمن مع المصادقة</footer>
</div>

<script>
    // إعدادات Firebase
    const firebaseConfig = {
        databaseURL: "https://xo-d7a80-default-rtdb.firebaseio.com/"
    };
    
    // تهيئة Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();
    
    // متغيرات اللعبة
    let gameRef = null;
    let playerSymbol = null;
    let isMyTurn = false;
    let gameId = null;
    let currentListener = null;
    let searchTimeout = null;
    let isSearching = false;
    let myUID = null;
    
    // عناصر DOM
    const statusMsg = document.getElementById('statusMsg');
    const turnMsg = document.getElementById('turnMsg');
    const searchBtn = document.getElementById('searchBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    const leaveBtn = document.getElementById('leaveBtn');
    const boardDiv = document.getElementById('board');
    
    // إنشاء لوحة اللعب
    function createBoard() {
        boardDiv.innerHTML = '';
        for (let i = 0; i < 9; i++) {
            const cell = document.createElement('div');
            cell.classList.add('cell', 'disabled');
            cell.dataset.index = i;
            cell.onclick = () => makeMove(i);
            boardDiv.appendChild(cell);
        }
    }
    
    // تسجيل دخول مجهول
    async function anonymousLogin() {
        try {
            statusMsg.innerText = "🔄 جاري التسجيل...";
            const userCredential = await auth.signInAnonymously();
            myUID = userCredential.user.uid;
            console.log("✅ تم التسجيل بنجاح:", myUID);
            statusMsg.innerText = "✅ جاهز للعب";
            turnMsg.innerText = "⚡ اضغط بحث للبدء";
            searchBtn.style.display = 'inline-block';
            return true;
        } catch (error) {
            console.error("❌ خطأ في التسجيل:", error);
            statusMsg.innerText = "❌ فشل التسجيل: " + error.message;
            turnMsg.innerText = "تأكد من تفعيل Anonymous Auth في Firebase";
            return false;
        }
    }
    
    // البحث عن لاعب
    async function searchForPlayer() {
        if (isSearching) {
            statusMsg.innerText = "⚠️ جاري البحث بالفعل...";
            return;
        }
        
        if (!myUID) {
            statusMsg.innerText = "❌ لم يتم التسجيل بعد...";
            return;
        }
        
        isSearching = true;
        searchBtn.disabled = true;
        cancelBtn.style.display = 'inline-block';
        statusMsg.innerHTML = '<span class="loading"></span> جاري البحث عن خصم...';
        
        try {
            const waitingRef = db.ref('waiting');
            const snapshot = await waitingRef.once('value');
            const waitingPlayer = snapshot.val();
            
            // حالة 1: يوجد لاعب ينتظر (وليس أنا)
            if (waitingPlayer && waitingPlayer.id !== myUID) {
                gameId = waitingPlayer.gameId;
                playerSymbol = 'O';
                gameRef = db.ref('games/' + gameId);
                
                // الانضمام للعبة
                await gameRef.update({ 
                    player2: myUID, 
                    status: 'playing',
                    updatedAt: Date.now()
                });
                await waitingRef.remove();
                startGame();
            } 
            // حالة 2: لا يوجد لاعب ينتظر
            else {
                playerSymbol = 'X';
                gameId = 'g_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                
                const newGame = {
                    id: gameId,
                    player1: myUID,
                    player2: null,
                    status: 'waiting',
                    board: Array(9).fill(""),
                    turn: 'X',
                    createdAt: Date.now()
                };
                
                gameRef = db.ref('games/' + gameId);
                await gameRef.set(newGame);
                await waitingRef.set({ id: myUID, gameId: gameId });
                
                statusMsg.innerHTML = '<span class="loading"></span> ننتظر خصماً...';
                
                // الاستماع لانضمام خصم
                currentListener = gameRef.on('value', (snap) => {
                    const data = snap.val();
                    if (data && data.status === 'playing' && data.player2) {
                        startGame();
                    }
                });
                
                // مهلة 30 ثانية
                searchTimeout = setTimeout(async () => {
                    if (isSearching) {
                        await cancelSearch();
                        statusMsg.innerText = "⌛ لم يتم العثور على خصم، حاول مرة أخرى";
                        searchBtn.disabled = false;
                        searchBtn.style.display = 'inline-block';
                    }
                }, 30000);
            }
        } catch (error) {
            console.error("خطأ في البحث:", error);
            statusMsg.innerText = "❌ خطأ في الاتصال، حاول مجدداً";
            searchBtn.disabled = false;
            searchBtn.style.display = 'inline-block';
            cancelBtn.style.display = 'none';
            isSearching = false;
        }
    }
    
    // إلغاء البحث
    async function cancelSearch() {
        if (searchTimeout) clearTimeout(searchTimeout);
        if (currentListener && gameRef) gameRef.off('value', currentListener);
        if (gameId) {
            await db.ref('games/' + gameId).remove().catch(e => console.log(e));
            await db.ref('waiting').remove().catch(e => console.log(e));
        }
        isSearching = false;
        cancelBtn.style.display = 'none';
        searchBtn.style.display = 'inline-block';
        searchBtn.disabled = false;
        statusMsg.innerText = "✅ تم الإلغاء";
        turnMsg.innerText = "⚡ اضغط بحث للبدء";
    }
    
    // بدء اللعبة
    function startGame() {
        if (searchTimeout) clearTimeout(searchTimeout);
        isSearching = false;
        cancelBtn.style.display = 'none';
        searchBtn.style.display = 'none';
        leaveBtn.style.display = 'inline-block';
        
        statusMsg.innerText = `🎮 بدأت! أنت ${playerSymbol}`;
        turnMsg.innerText = "⏳ جاري تحميل اللعبة...";
        
        // إزالة المستمع القديم
        if (currentListener && gameRef) gameRef.off('value', currentListener);
        
        // إضافة مستمع جديد للتحديثات
        gameRef.on('value', (snap) => {
            const data = snap.val();
            if (data) updateUI(data);
        });
    }
    
    // تحديث واجهة اللعبة
    function updateUI(data) {
        const board = data.board || Array(9).fill("");
        const cells = document.querySelectorAll('.cell');
        
        // تحديث الخلايا
        board.forEach((val, i) => {
            cells[i].innerText = val;
            cells[i].className = `cell ${val}`;
            
            // تمكين الخلية إذا كان دوري واللعبة مستمرة والخلية فارغة
            if (data.turn === playerSymbol && data.status === 'playing' && val === "") {
                cells[i].classList.remove('disabled');
            } else {
                cells[i].classList.add('disabled');
            }
        });
        
        // تحديث حالة اللعبة
        if (data.status === 'finished') {
            if (data.winner === 'draw') {
                statusMsg.innerText = "🤝 تعادل!";
                turnMsg.innerText = "انتهت المباراة";
            } else if (data.winner === playerSymbol) {
                statusMsg.innerText = "🎉 فزت! 🎉";
                turnMsg.innerText = "مبروك الفوز!";
            } else {
                statusMsg.innerText = "💔 خسرت";
                turnMsg.innerText = "حظاً أوفر في المرة القادمة";
            }
            
            // إعادة تعيين بعد 3 ثواني
            setTimeout(() => {
                if (confirm("انتهت اللعبة! هل تريد لعب مباراة جديدة؟")) {
                    location.reload();
                }
            }, 2000);
        } else {
            isMyTurn = (data.turn === playerSymbol);
            turnMsg.innerText = isMyTurn ? "🎯 دورك الآن" : "⏳ انتظر دور الخصم";
        }
    }
    
    // تنفيذ الحركة
    async function makeMove(index) {
        if (!isMyTurn) return;
        
        const snap = await gameRef.once('value');
        const data = snap.val();
        
        if (!data || data.status !== 'playing') return;
        if (data.board[index] !== "") return;
        
        const newBoard = [...data.board];
        newBoard[index] = playerSymbol;
        
        // التحقق من الفوز
        const winner = checkWinner(newBoard);
        const isDraw = !winner && newBoard.every(cell => cell !== "");
        
        const updates = {
            board: newBoard,
            turn: playerSymbol === 'X' ? 'O' : 'X'
        };
        
        if (winner || isDraw) {
            updates.status = 'finished';
            updates.winner = winner || 'draw';
        }
        
        await gameRef.update(updates);
    }
    
    // التحقق من الفائز
    function checkWinner(board) {
        const lines = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];
        
        for (let line of lines) {
            const [a, b, c] = line;
            if (board[a] && board[a] === board[b] && board[a] === board[c]) {
                return board[a];
            }
        }
        return null;
    }
    
    // مغادرة اللعبة
    async function leaveGame() {
        if (gameRef && gameId) {
            await gameRef.remove().catch(e => console.log(e));
            await db.ref('waiting').remove().catch(e => console.log(e));
        }
        location.reload();
    }
    
    // ربط الأزرار
    searchBtn.onclick = searchForPlayer;
    cancelBtn.onclick = cancelSearch;
    leaveBtn.onclick = leaveGame;
    
    // تهيئة اللعبة
    createBoard();
    
    // تفعيل المصادقة المجهولة أولاً
    anonymousLogin().then(success => {
        if (!success) {
            statusMsg.innerText = "⚠️ تحتاج تفعيل Anonymous Auth في Firebase Console";
        }
    });
    
    // التحقق من الاتصال
    const connectedRef = db.ref('.info/connected');
    connectedRef.on('value', (snap) => {
        if (snap.val()) {
            console.log("✅ متصل بـ Firebase");
        } else {
            statusMsg.innerText = "⚠️ لا يوجد اتصال بالإنترنت";
        }
    });
</script>
</body>
</html>
